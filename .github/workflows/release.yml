name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:  # allows manual runs from the Actions tab to test builds

jobs:
  build-deb:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            jq cmake \
            libexpat1-dev libfontconfig-dev libfreetype-dev \
            libxkbcommon-dev pkgconf

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: deb-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: deb-${{ runner.os }}-

      - name: Build .deb
        run: bash build-deb.sh

      - uses: actions/upload-artifact@v6
        with:
          name: deb
          path: "release/*.deb"

  build-flatpak:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - name: Resolve version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "value=${{ github.ref_name }}" | sed 's/^value=v/value=/' >> "$GITHUB_OUTPUT"
          else
            echo "value=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')" >> "$GITHUB_OUTPUT"
          fi

      - name: Cache vendor directory
        uses: actions/cache@v5
        with:
          path: vendor
          key: vendor-${{ hashFiles('**/Cargo.lock') }}

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y flatpak flatpak-builder ostree

      - name: Add Flathub remote
        run: flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Generate vendored dependencies
        run: mkdir -p .cargo && cargo vendor > .cargo/config.toml

      - name: Install Flatpak SDKs
        run: |
          flatpak install --noninteractive --user flathub \
            org.freedesktop.Sdk//25.08 \
            org.freedesktop.Platform//25.08 \
            org.freedesktop.Sdk.Extension.rust-stable//25.08 \
            com.system76.Cosmic.BaseApp//stable

      - name: Build app
        run: |
          flatpak-builder \
            --disable-rofiles-fuse \
            --repo=repo \
            --default-branch=testing \
            --user \
            release \
            io.github.k33wee.clippy-land.json

      - name: Create Flatpak bundle
        run: |
          flatpak build-bundle \
            repo \
            clippy-land_${{ steps.version.outputs.value }}.flatpak \
            io.github.k33wee.clippy-land \
            testing

      - uses: actions/upload-artifact@v6
        with:
          name: flatpak
          path: clippy-land_${{ steps.version.outputs.value }}.flatpak

  release:
    needs: [build-deb, build-flatpak]
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    # only publish when triggered by a tag push, not manual runs
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            deb/*.deb
            flatpak/*.flatpak
          generate_release_notes: true
